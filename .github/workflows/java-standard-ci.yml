name: "Standard Java CI - Demo Mode"

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      java_version:
        default: '17'
        type: string

jobs:
  demo-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: "1. 代码检出"
        uses: actions/checkout@v4

      - name: "2. 初始化 Java 环境"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: "3. 模拟构建 (Maven)"
        # 即使你仓库没代码，这一步也会尝试执行，为了演示你可以直接 echo
        run: |
          echo "执行构建命令: mvn clean package"
          echo "Build Success!"

      - name: "4. 漏洞扫描 (仅展示不拦截)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '0' # 即使有漏洞也不报错，保证流水线变绿
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: "5. 模拟镜像打包"
        run: |
          echo "正在构建镜像: ${{ inputs.service_name }}:latest"
          echo "镜像构建完成，跳过推送步骤（演示模式）"