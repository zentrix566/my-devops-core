name: "Standard Java CI - Demo Mode"

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      java_version:
        default: '17'
        type: string

env:
  # 解决 Node.js 20 警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  demo-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: "1. 代码检出"
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}

      - name: "2. 初始化 Java 环境"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'
          # 注意：如果 test 仓库真的没 pom.xml，这行 cache 可能会报错，演示时可以先注释掉
          # cache: 'maven' 

      - name: "3. 执行构建"
        run: |
          if [ -f "pom.xml" ]; then
            echo "检测到 pom.xml，执行模拟构建..."
          else
            echo "未检测到 pom.xml，创建虚拟文件进行演示..."
            touch pom.xml
          fi
          echo "Build Success!"

      - name: "4. 模拟镜像打包"
        run: |
          echo "正在构建镜像: ${{ inputs.service_name }}:latest"