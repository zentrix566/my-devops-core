name: DevOps Auto Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]

jobs:
  build-and-deploy:
    # 引用你中央仓库定义的标准工作流
    uses: zentrix566/my-devops-core/.github/workflows/standard-build.yml@main
    with:
      app_name: {{APP_NAME}}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}